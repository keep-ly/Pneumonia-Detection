data:
  data_root: "data/chest_xray"
  image_size: 224
  batch_size: 64
  num_workers: 4
  # batch_size: 32   # 消费级GPU推荐32，显存充裕可上调至64
  # num_workers: 0   # Windows 推荐设为 0，避免多进程问题

model:
  architecture: "resnet50"   # resnet50 / efficientnet-b0 / custom_cnn
  pretrained: true
  dropout_rate: 0.2

training:
  epochs: 40
  learning_rate: 1e-4
  weight_decay: 1e-5
  lr_scheduler: "cosine"    # cosine / step / plateau
  early_stopping_patience: 7
  pos_weight: auto          # auto 自动计算，或指定数值如 0.35

augmentation:
  horizontal_flip_prob: 0.5
  rotation_degrees: 15
  brightness_range: [0.8, 1.2]

logging:
  log_dir: "outputs/logs"
  checkpoint_dir: "outputs/checkpoints"
  result_dir: "outputs/results"
